<!DOCTYPE html>
<html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>NM Vehicle Crashes</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.js"></script>
<style>
  html,body,#map{height:100%;margin:0}
  .panel{position:absolute;z-index:1000;background:rgba(255,255,255,.95);border:1px solid #ccc;
    border-radius:6px;box-shadow:0 1px 6px rgba(0,0,0,.2);font:12px/1.4 -apple-system,Helvetica,Arial}
  #ctrl{bottom:18px;right:14px;padding:10px 13px;width:210px}
  #ctrl .yr{font-weight:600;margin-bottom:9px}
  #slider{margin:2px 7px 4px}
  #stat{margin-top:9px;color:#444}
  /* thin slider with small vertical-line handles */
  .noUi-target{height:3px;border:none;background:#dcdcdc;box-shadow:none}
  .noUi-connect{background:#2171b5}
  .noUi-horizontal .noUi-handle{width:4px;height:17px;right:-2px;top:-7px;border:none;
    border-radius:1px;background:#1f5fa8;box-shadow:none;cursor:ew-resize}
  .noUi-handle:after,.noUi-handle:before{display:none}
  #legend{bottom:18px;left:14px;padding:8px 11px;max-width:230px;color:#333}
  #legend b{display:block;margin-bottom:3px}
  #legend .sw{display:inline-block;width:13px;height:8px;margin-right:1px;vertical-align:1px}
  .muted{color:#888;font-size:10.5px}
</style></head>
<body>
<div id="map"></div>
<div id="ctrl" class="panel"><div class="yr">Years: <span id="yrlabel"></span></div>
  <div id="slider"></div><div id="stat"></div></div>
<div id="legend" class="panel">
  <b>Fatal crashes per 100M vehicle-miles</b>
  <div><span class="sw" style="background:#1a9850"></span>&lt;1
    <span class="sw" style="background:#a6d96a"></span>1–3
    <span class="sw" style="background:#fee08b"></span>3–6
    <span class="sw" style="background:#fdae61"></span>6–12
    <span class="sw" style="background:#d73027"></span>12+
    <span class="sw" style="background:#d4d4d4"></span>none</div>
  <div class="muted" style="margin-top:5px">Rate = fatal crashes in range ÷ traffic (2024 AADT) ÷
    road length; small counts. U.S. avg ≈ 1.3. County roads lack traffic data.
    Data: NHTSA FARS + NMDOT.</div>
</div>
<script>
const YMIN=2001, YMAX=2024;
const map=L.map('map',{attributionControl:true}).setView([35.41,-105.95],12);
map.attributionControl.setPrefix(false);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {attribution:'© OSM, © CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
const canvas=L.canvas({padding:.5});
const segLayer=L.layerGroup().addTo(map), ptLayer=L.layerGroup().addTo(map);
function rateColor(r,n){ if(!n||r==null) return '#d4d4d4';
  return r<1?'#1a9850':r<3?'#a6d96a':r<6?'#fee08b':r<12?'#fdae61':'#d73027'; }
const DOW=['','Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function crashPopup(c){
  let cas=`${c.k} killed`;
  if(c.inj) cas+=` · ${c.inj} injured`+(c.si?` (${c.si} serious)`:'');
  let date=[c.dw?DOW[c.dw]:'', `${MON[c.m]||''} ${c.dy||''}, ${c.y}`.trim()].filter(Boolean).join(', ');
  if(c.hr!=null){ const h=c.hr%12||12; date+=` · ${h} ${c.hr<12?'AM':'PM'}`; }
  const details=[c.ev, c.d?'alcohol involved':''].filter(Boolean).join(' · ');
  let html=`<div style="font:12px/1.55 -apple-system,Helvetica,Arial"><b>${cas}</b>`
    +`<br><span style="color:#555">${date}</span>`;
  if(details) html+=`<br>${details}`;
  return html+'</div>';
}
let SEG=[], CR=[], y0=YMIN, y1=YMAX;

function draw(){
  const ny=y1-y0+1;
  segLayer.clearLayers();
  SEG.forEach(s=>{
    const n=s.y.filter(y=>y>=y0&&y<=y1).length, vmt=s.a*365*ny*s.l, rate=vmt? n/vmt*1e8:null;
    const tip=`<b>${s.lab}</b><br>${n} fatal crash(es) ${y0}–${y1} on this ${s.l}-mi segment`
      +`<br>AADT ${s.a.toLocaleString()}`+(rate!=null?`<br>rate ${rate.toFixed(1)} per 100M veh-mi`:'');
    L.polyline(s.c,{color:rateColor(rate,n),weight:n?7:2,opacity:.85}).bindPopup(tip).addTo(segLayer);
  });
  ptLayer.clearLayers();
  let nc=0,nk=0;
  CR.forEach(c=>{ if(c.y<y0||c.y>y1) return; nc++; nk+=c.k;
    L.circleMarker([c.la,c.lo],{renderer:canvas,radius:4+(c.k-1)*2,color:'#67000d',weight:1,
      fillColor:'#cb181d',fillOpacity:.9}).bindPopup(crashPopup(c)).addTo(ptLayer);
  });
  document.getElementById('yrlabel').textContent = y0===y1? y0 : `${y0}–${y1}`;
  document.getElementById('stat').innerHTML = `${nc.toLocaleString()} fatal crashes · ${nk.toLocaleString()} killed`;
}
const slider=document.getElementById('slider');
noUiSlider.create(slider,{start:[YMIN,YMAX],connect:true,step:1,margin:0,
  range:{min:YMIN,max:YMAX},format:{to:v=>Math.round(v),from:v=>Number(v)}});
slider.noUiSlider.on('update',v=>{ y0=+v[0]; y1=+v[1]; draw(); });
Promise.all([fetch('data/segments.json').then(r=>r.json()),fetch('data/crashes.json').then(r=>r.json())])
  .then(([s,c])=>{ SEG=s; CR=c; draw(); });
</script>
</body></html>
