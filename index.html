background:#1f2d3d;color:#fff;display:flex;align-items:center;justify-content:center;text-align:center}
.b{font-weight:800;letter-spacing:.5px;font-size:30px;margin-bottom:12px}.b b{color:#e3120b}

<div class="b">THE <b>DEADLIEST</b> MILE</div>
<div>Finding the map for your state…</div>
<div style="margin-top:14px;font-size:14px">Or jump to: <a href="./NM/">New Mexico</a> · <a href="./VT/">Vermont</a> · <a href="./TX/">Texas</a> · <a href="./NJ/">New Jersey</a></div>
</div><script>
var AVAIL=["NM","VT","TX","NJ"];
function go(s){location.replace("./"+s+"/"+location.hash);}
try{fetch("https://ipapi.co/json/").then(function(r){return r.json();}).then(function(j){
var c=(j.region_code||"").toUpperCase();go(AVAIL.indexOf(c)>=0?c:"NM");}).catch(function(){go("NM");});}
catch(e){go("NM");}
</script></body></html>
