const map=L.map('map',{zoomControl:true,attributionControl:true}).setView([35.41,-105.95],12);
map.attributionControl.setPrefix(false);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {attribution:'© OSM, © CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
const canvas=L.canvas({padding:.5});
const segLayer=L.layerGroup().addTo(map), ptLayer=L.layerGroup().addTo(map), kabLayer=L.layerGroup();

function rateColor(r,n){ if(!n||r==null) return '#d4d4d4';
  return r<1?'#1a9850':r<3?'#a6d96a':r<6?'#fee08b':r<12?'#fdae61':'#d73027'; }
const sevC={K:'#000',A:'#f03b20',B:'#fecc5c'}, sevN={K:'killed',A:'serious injury',B:'minor injury'};
const harmPretty={Pedalcyclist:'bicyclist killed',Pedestrian:'pedestrian killed',
  'Motor Vehicle In-Transport':'vehicle collision','Rollover/Overturn':'rollover'};
let y0=YMIN, y1=YMAX;

function match(c){ // c = [year,killed,alc,nonmotor] or crash obj
  const yr=c.y!==undefined?c.y:c[0], al=c.d!==undefined?c.d:c[2], nm=c.nm!==undefined?c.nm:c[3];
  return yr>=y0 && yr<=y1 && (!fAlc.checked||al) && (!fPed.checked||nm);
}

function draw(){
  const ny=y1-y0+1;
  segLayer.clearLayers();
  SEGMENTS.forEach(s=>{
    const m=s.x.filter(match), n=m.length, vmt=s.a*365*ny*s.l, rate=vmt? n/vmt*1e8:null;
    const tip=`<b>${s.lab}</b><br>${n} fatal crash(es) ${y0}–${y1} on this ${s.l}-mi segment`
      +`<br>AADT ${s.a.toLocaleString()}`+(rate!=null?`<br>rate ${rate.toFixed(1)} per 100M veh-mi`:'');
    L.polyline(s.c,{color:rateColor(rate,n),weight:n?7:2.5,opacity:.85}).bindPopup(tip).addTo(segLayer);
  });
  ptLayer.clearLayers();
  let nc=0, nk=0, na=0;
  CRASHES.filter(match).forEach(c=>{
    nc++; nk+=c.k; na+=c.d;
    const lab=harmPretty[c.h]||c.h||'fatal crash';
    const pop=`<b>${lab}</b><br>${c.y}`+(c.k>1?` · ${c.k} killed`:'')+(c.d?'<br>alcohol involved':'');
    L.circleMarker([c.la,c.lo],{renderer:canvas,radius:4+(c.k-1)*2,color:'#67000d',weight:1,

  });
  kabLayer.clearLayers();
  KAB.filter(c=>c.y>=y0&&c.y<=y1).forEach(c=>{
    L.circleMarker([c.la,c.lo],{renderer:canvas,radius:3,color:sevC[c.s]||'#999',weight:1,
      fillColor:sevC[c.s]||'#999',fillOpacity:.7}).bindPopup(`${sevN[c.s]||c.s} · ${c.y}`).addTo(kabLayer);
  });
  document.getElementById('yrlabel').textContent = y0===y1? y0 : `${y0}–${y1}`;
  document.getElementById('stat').innerHTML =
    `${nc} fatal crashes · ${nk} killed<br><span class="sub">${na} alcohol-involved</span>`;
}

const fAlc=document.getElementById('fAlc'), fPed=document.getElementById('fPed'), fKab=document.getElementById('fKab');
const slider=document.getElementById('slider');
noUiSlider.create(slider,{start:[YMIN,YMAX],connect:true,step:1,margin:0,
  range:{min:YMIN,max:YMAX},format:{to:v=>Math.round(v),from:v=>Number(v)}});
slider.noUiSlider.on('update',v=>{ y0=+v[0]; y1=+v[1]; draw(); });
[fAlc,fPed].forEach(el=>el.addEventListener('change',draw));
